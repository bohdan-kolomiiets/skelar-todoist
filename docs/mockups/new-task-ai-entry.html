<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>New task — AI entry</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/3.31.0/tabler-icons.min.css">
<style>
:root{
--surface-2:#ffffff;--surface-1:#f4f2ec;--surface-0:#eceae3;
--border:rgba(0,0,0,.10);--border-strong:rgba(0,0,0,.20);
--text-primary:#2b2a27;--text-secondary:#5f5e5a;--text-muted:#8a8983;
--text-accent:#185fa5;--fill-accent:#1f6fd0;--on-accent:#ffffff;
}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--text-primary);-webkit-font-smoothing:antialiased;display:flex;justify-content:center;padding:24px;background:var(--surface-0)}
button{font-family:inherit;cursor:pointer}
.phone{width:340px;min-height:560px;background:var(--surface-2);border:0.5px solid var(--border);border-radius:22px;overflow:hidden;display:flex;flex-direction:column}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:0.5px solid var(--border)}
.nta{flex:1;min-height:150px;resize:none;width:100%;font-family:inherit;font-size:16px;line-height:1.6;border:0;background:transparent;color:var(--text-primary)}
.nta::placeholder{color:var(--text-muted)}
.parse{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:13px;border:0;border-radius:12px;background:var(--fill-accent);color:var(--on-accent);font-size:16px;font-weight:500}
.manual{align-self:center;border:0;background:none;color:var(--text-secondary);font-size:14px;padding:4px}
</style>
</head>
<body>
<div class="phone">
  <div class="hdr">
    <button aria-label="Cancel" style="border:0;background:none;color:var(--text-secondary);padding:2px"><i class="ti ti-x" style="font-size:22px" aria-hidden="true"></i></button>
    <span style="font-size:16px;font-weight:500">New task</span>
    <span style="width:22px"></span>
  </div>
  <div style="flex:1;display:flex;flex-direction:column;padding:16px;gap:10px">
    <div style="flex:1;display:flex;flex-direction:column;border:0.5px solid var(--border);border-radius:12px;background:var(--surface-1);padding:12px">
      <textarea class="nta" placeholder="What needs doing?&#10;&#10;e.g. call plumber tomorrow 3pm — or list a few, and I'll sort them."></textarea>
    </div>
    <p style="margin:0;font-size:12px;color:var(--text-muted);display:flex;align-items:center;gap:6px"><i class="ti ti-info-circle" style="font-size:14px" aria-hidden="true"></i>One task opens the editor · several open Review.</p>
    <button class="parse"><i class="ti ti-wand" style="font-size:18px" aria-hidden="true"></i>Parse with AI</button>
    <button class="manual"><i class="ti ti-adjustments-horizontal" style="font-size:15px;vertical-align:-2px" aria-hidden="true"></i> Enter manually</button>
  </div>
</div>
</body>
</html>

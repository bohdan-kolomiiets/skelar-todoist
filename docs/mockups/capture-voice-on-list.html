<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Capture — voice already on list</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/3.31.0/tabler-icons.min.css">
<style>
:root{
--surface-2:#ffffff;--surface-1:#f4f2ec;--surface-0:#eceae3;
--border:rgba(0,0,0,.10);--border-strong:rgba(0,0,0,.22);
--text-primary:#2b2a27;--text-secondary:#5f5e5a;--text-muted:#8a8983;
--bg-success:#e1f5ee;--text-success:#0f6e56;
}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--text-primary);-webkit-font-smoothing:antialiased;display:flex;justify-content:center;padding:24px;background:var(--surface-0)}
button{font-family:inherit;cursor:pointer}
.phone{width:340px;min-height:420px;background:rgba(0,0,0,.45);border-radius:22px;display:flex;align-items:flex-end;overflow:hidden}
.sheet{width:100%;background:var(--surface-2);border-top-left-radius:18px;border-top-right-radius:18px;padding:14px 18px 20px;display:flex;flex-direction:column;gap:12px}
.grab{width:36px;height:4px;border-radius:999px;background:var(--border-strong);align-self:center;margin-bottom:2px}
.icircle{width:34px;height:34px;border-radius:50%;background:var(--bg-success);display:flex;align-items:center;justify-content:center;color:var(--text-success)}
.got{width:100%;padding:11px;border:0.5px solid var(--border-strong);border-radius:12px;background:var(--surface-1);color:var(--text-primary);font-size:15px;font-weight:500}
</style>
</head>
<body>
<div class="phone">
  <div class="sheet">
    <div class="grab"></div>
    <div style="display:flex;align-items:center;gap:9px">
      <span class="icircle"><i class="ti ti-check" style="font-size:19px" aria-hidden="true"></i></span>
      <div>
        <p style="margin:0;font-size:15px;font-weight:500">You're on the list</p>
        <p style="margin:0;font-size:13px;color:var(--text-secondary)">We'll email <span style="color:var(--text-primary)">maya@acme.com</span> when voice lands.</p>
      </div>
    </div>
    <button class="got">Got it</button>
  </div>
</div>
</body>
</html>

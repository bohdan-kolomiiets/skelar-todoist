<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Today</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/3.31.0/tabler-icons.min.css">
<style>
:root{
--surface-2:#ffffff;--surface-1:#f4f2ec;--surface-0:#eceae3;
--border:rgba(0,0,0,.10);--border-strong:rgba(0,0,0,.20);
--text-primary:#2b2a27;--text-secondary:#5f5e5a;--text-muted:#8a8983;
--text-accent:#185fa5;--fill-accent:#1f6fd0;--on-accent:#ffffff;--bg-accent:#e6f1fb;
--bg-warning:#faeeda;--text-warning:#854f0b;--border-warning:#e5c48f;
--bg-danger:#fceceb;--text-danger:#a32d2d;--border-danger:#e6a6a4;
}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--text-primary);-webkit-font-smoothing:antialiased;display:flex;justify-content:center;padding:24px;background:var(--surface-0)}
button{font-family:inherit;cursor:pointer}
.phone{width:340px;min-height:640px;background:var(--surface-2);border:0.5px solid var(--border);border-radius:22px;overflow:hidden;display:flex;flex-direction:column}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 0;font-size:11px;color:var(--text-muted);background:none;border:0}
.tab i{font-size:20px}.tab.on{color:var(--text-accent)}
.sq{display:flex;align-items:center;justify-content:center;width:46px;height:30px;border-radius:11px;background:var(--bg-accent)}
.sec{font-size:13px;color:var(--text-secondary);margin:14px 2px 2px;font-weight:500}
.trow{display:flex;gap:11px;align-items:center;padding:11px 2px;border-bottom:0.5px solid var(--border);width:100%}
.cbox{width:21px;height:21px;border-radius:50%;border:1.5px solid var(--border-strong);flex-shrink:0;background:none;padding:0}
.cbox.done{border-color:var(--text-muted);background:var(--text-muted);color:var(--surface-2);display:flex;align-items:center;justify-content:center}
.tline{margin:0;font-size:15px;line-height:1.3;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.time{color:var(--text-secondary);font-size:13px}
.metas{display:flex;flex-wrap:wrap;gap:6px;margin-top:5px}
.chip{display:inline-flex;align-items:center;gap:4px;font-size:12px;padding:2px 8px;border-radius:999px;border:0.5px solid var(--border);background:var(--surface-1);color:var(--text-secondary)}
.move{display:inline-flex;align-items:center;gap:3px;font-size:12px;padding:5px 9px;border-radius:999px;border:0.5px solid var(--border);background:none;color:var(--text-secondary);flex-shrink:0}
</style>
</head>
<body>
<div class="phone">

  <div style="padding:16px 16px 6px">
    <p style="margin:0;font-size:20px;font-weight:500">Today</p>
    <p style="margin:2px 0 0;font-size:13px;color:var(--text-secondary)">Monday, Jul 20 · 1 of 5 done</p>
  </div>

  <div style="flex:1;padding:0 16px 10px">

    <p class="sec" style="color:var(--text-danger)">Overdue</p>
    <div class="trow">
      <span class="cbox" aria-label="Complete"></span>
      <span style="flex:1"><span class="tline">Send the invoice</span><span class="metas"><span class="chip" style="background:var(--bg-danger);color:var(--text-danger);border-color:var(--border-danger)"><i class="ti ti-alarm" style="font-size:13px" aria-hidden="true"></i>due 2 days ago</span></span></span>
      <button class="move"><i class="ti ti-arrow-narrow-right" style="font-size:14px" aria-hidden="true"></i>Inbox</button>
    </div>

    <p class="sec">Morning</p>
    <div class="trow">
      <span class="cbox" aria-label="Complete"></span>
      <span style="flex:1"><span class="tline"><span class="time">9:00</span>Team standup</span></span>
      <button class="move"><i class="ti ti-arrow-narrow-right" style="font-size:14px" aria-hidden="true"></i>Inbox</button>
    </div>
    <div class="trow">
      <span class="cbox" aria-label="Complete"></span>
      <span style="flex:1"><span class="tline"><i class="ti ti-flag" style="font-size:15px;color:var(--text-danger)" aria-hidden="true"></i>Finish the pitch deck</span><span class="metas"><span class="chip" style="background:var(--bg-warning);color:var(--text-warning);border-color:var(--border-warning)"><i class="ti ti-clock" style="font-size:13px" aria-hidden="true"></i>due Fri</span><span class="chip">work</span></span></span>
      <button class="move"><i class="ti ti-arrow-narrow-right" style="font-size:14px" aria-hidden="true"></i>Inbox</button>
    </div>

    <p class="sec">Afternoon</p>
    <div class="trow">
      <span class="cbox" aria-label="Complete"></span>
      <span style="flex:1"><span class="tline"><i class="ti ti-flag" style="font-size:15px;color:var(--text-danger)" aria-hidden="true"></i>Reply to Anna</span></span>
      <button class="move"><i class="ti ti-arrow-narrow-right" style="font-size:14px" aria-hidden="true"></i>Inbox</button>
    </div>

    <p class="sec">Evening</p>
    <div class="trow">
      <span class="cbox" aria-label="Complete"></span>
      <span style="flex:1"><span class="tline">Gym</span></span>
      <button class="move"><i class="ti ti-arrow-narrow-right" style="font-size:14px" aria-hidden="true"></i>Inbox</button>
    </div>

    <button style="display:flex;align-items:center;gap:10px;width:100%;padding:12px 2px;border:0;background:none;color:var(--text-secondary);font-size:14px;text-align:left;margin-top:4px"><i class="ti ti-plus" style="font-size:18px" aria-hidden="true"></i>Add task</button>

    <div style="display:flex;align-items:center;justify-content:space-between;margin-top:10px;padding-top:8px;border-top:0.5px solid var(--border)">
      <span style="font-size:13px;color:var(--text-secondary);font-weight:500">Completed · 1</span>
      <button style="border:0;background:none;color:var(--text-accent);font-size:13px">Hide</button>
    </div>
    <div class="trow" style="border-bottom:0">
      <span class="cbox done" aria-label="Completed"><i class="ti ti-check" style="font-size:14px" aria-hidden="true"></i></span>
      <span style="flex:1"><span class="tline" style="color:var(--text-muted);text-decoration:line-through">Book the dentist</span></span>
    </div>

  </div>

  <nav style="display:flex;border-top:0.5px solid var(--border);padding:2px 4px 6px">
    <button class="tab"><i class="ti ti-bulb" aria-hidden="true"></i>Capture</button>
    <button class="tab on"><span class="sq"><i class="ti ti-sun" aria-hidden="true"></i></span>Today</button>
    <button class="tab"><i class="ti ti-inbox" aria-hidden="true"></i>Inbox</button>
  </nav>

</div>
</body>
</html>
